name: CI

on:
  push:
    branches: [master, main, "P1_*"]
  pull_request:
    branches: [master, main, "P1_*"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[dev,gemini,benchmark-healthcare,cortex]"
          pip install "prismlib-plus>=0.7.0"

      - name: Cache prismlang ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.prismlang/models
          key: prismlang-onnx-${{ runner.os }}-all-MiniLM-L6-v2-v1

      - name: Prefetch prismlang ONNX encoder (no API keys)
        run: python -c "from prismlang.encoder import encode; encode('ci-warmup')"

      - name: Ruff lint (E1 scope — tests + CI)
        run: ruff check tests .github

      - name: Ruff format check (E1 scope)
        run: ruff format --check tests .github

      - name: Mypy (baseline — legacy type debt; see docs/ENTERPRISE_READINESS.md)
        continue-on-error: true
        run: mypy chorusgraph --config-file pyproject.toml

      - name: Deterministic test suite (no secrets, no network)
        env:
          CHORUSGRAPH_DETERMINISTIC: "1"
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: pytest tests -q --timeout=120 --cov=chorusgraph --cov=benchmark --cov-report=term-missing:skip-covered

      - name: SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          cyclonedx-py environment -o sbom/ci-sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/ci-sbom.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools
        run: |
          python -m pip install -U pip "setuptools>=83"
          pip install -e ".[dev]"
          pip install bandit pip-audit
      - name: Bandit SAST
        run: bandit -r chorusgraph -ll -x tests
      - name: pip-audit SCA
        # chromadb PYSEC-2026-311 / GHSA-f4j7-r4q5-qw2c: no stable fix yet (last affected 1.5.9).
        # We only use the client embed path for optional retrieval; ignore until upstream patches.
        run: |
          pip-audit -r requirements-lock.txt \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln GHSA-f4j7-r4q5-qw2c \
          || pip-audit \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln GHSA-f4j7-r4q5-qw2c
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  live-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,gemini,benchmark-healthcare,cortex]"
      - name: Live Gemini/API tests
        env:
          CHORUSGRAPH_LIVE: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pytest tests -m live -q
